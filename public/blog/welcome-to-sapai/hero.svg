<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="SapAi blog placeholder">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4f4f5"/>
      <stop offset="100%" style="stop-color:#e4e4e7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="80" y="80" width="1040" height="470" rx="24" fill="#fff" stroke="#d4d4d8" stroke-width="2"/>
  <text x="600" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="42" font-weight="600" fill="#18181b">SapAi Blog</text>
  <text x="600" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" fill="#71717a">Replace with your image in public/blog/&lt;slug&gt;/</text>
</svg>
